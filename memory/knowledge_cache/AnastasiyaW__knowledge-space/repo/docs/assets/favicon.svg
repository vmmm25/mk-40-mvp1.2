<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Seamless loop: center -> explode -> drift -> back to center -->
  <!-- keyTimes: 0=center, 0.15=exploded, 0.3=settled, 0.5=drift1, 0.7=drift2, 0.85=settled, 1.0=center -->

  <!-- Links: visible during settled+drift phase (0.3-0.85) -->
  <line stroke="#fff" stroke-width="1.2">
    <animate attributeName="x1" values="32;10;28;30;26;28;32" keyTimes="0;0.15;0.3;0.5;0.7;0.85;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="32;8;22;20;24;22;32" keyTimes="0;0.15;0.3;0.5;0.7;0.85;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="32;56;42;44;40;42;32" keyTimes="0;0.15;0.3;0.5;0.7;0.85;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="32;12;30;28;32;30;32" keyTimes="0;0.15;0.3;0.5;0.7;0.85;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.2;0.15;0.2;0.15;0" keyTimes="0;0.2;0.35;0.5;0.7;0.8;1" dur="8s" repeatCount="indefinite"/>
  </line>
  <line stroke="#fff" stroke-width="1">
