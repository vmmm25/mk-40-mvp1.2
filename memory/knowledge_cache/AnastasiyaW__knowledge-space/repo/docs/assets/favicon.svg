  </circle>
  <!-- Blue -->
  <circle r="4" fill="#82b1ff" opacity="0.75">
    <animate attributeName="cx" values="32;54;50;52;48;50;32" keyTimes="0;0.15;0.3;0.5;0.7;0.85;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="32;8;16;18;14;16;32" keyTimes="0;0.15;0.3;0.5;0.7;0.85;1" dur="8s" repeatCount="indefinite"/>
