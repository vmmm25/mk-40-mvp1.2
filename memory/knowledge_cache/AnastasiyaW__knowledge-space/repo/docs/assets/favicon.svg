    <animate attributeName="y1" values="32;8;22;24;20;22;32" keyTimes="0;0.15;0.3;0.5;0.7;0.85;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="32;8;18;16;20;18;32" keyTimes="0;0.15;0.3;0.5;0.7;0.85;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="32;54;40;42;38;40;32" keyTimes="0;0.15;0.3;0.5;0.7;0.85;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.18;0.12;0.18;0.12;0" keyTimes="0;0.2;0.35;0.5;0.7;0.8;1" dur="8s" repeatCount="indefinite"/>
  </line>
  <line stroke="#fff" stroke-width="0.8">
