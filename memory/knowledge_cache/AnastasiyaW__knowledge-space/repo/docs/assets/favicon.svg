    <animate attributeName="y1" values="32;12;30;32;28;30;32" keyTimes="0;0.15;0.3;0.5;0.7;0.85;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="32;52;38;40;36;38;32" keyTimes="0;0.15;0.3;0.5;0.7;0.85;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="32;56;46;48;44;46;32" keyTimes="0;0.15;0.3;0.5;0.7;0.85;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.15;0.1;0.15;0.1;0" keyTimes="0;0.2;0.35;0.5;0.7;0.8;1" dur="8s" repeatCount="indefinite"/>
  </line>
  <line stroke="#fff" stroke-width="0.8">
