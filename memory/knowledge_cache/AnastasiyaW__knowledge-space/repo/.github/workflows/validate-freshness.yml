name: Validate Freshness

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'mkdocs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'mkdocs.yml'

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check stats, wiki-links, llms.txt
        run: python hooks/freshness_check.py --ci
