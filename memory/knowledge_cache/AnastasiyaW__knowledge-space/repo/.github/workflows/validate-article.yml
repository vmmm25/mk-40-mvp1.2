name: Validate Articles

on:
  push:
    branches: [master]
    paths:
      - 'docs/**/*.md'
      - 'hooks/**'
      - '.github/workflows/validate-article.yml'
  pull_request:
    paths:
      - 'docs/**/*.md'
      - '.github/workflows/validate-article.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v46
        with:
          files: 'docs/**/*.md'
          safe_output: true
          separator: "\n"

      - name: Validate article format
        if: steps.changed.outputs.any_changed == 'true'
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          errors=0

          while IFS= read -r file; do
            # Strip trailing backslash/CR from safe_output
            file="${file%\\}"
            file="${file%$'\r'}"
            [ -z "$file" ] && continue
            echo "--- Validating: $file ---"

            # Skip only root index.md (everything else must pass validation)
            if [[ "$file" == "docs/index.md" ]] || [[ "$file" == docs/contributing/* ]]; then
              echo "  Skipping (homepage/contributing pages)"
              continue
            fi

            # Check file exists and is not empty
            if [ ! -s "$file" ]; then
              echo "::error file=$file::File is empty"
              errors=$((errors + 1))
              continue
            fi

            lines=$(wc -l < "$file")

            # Check minimum length
            if [ "$lines" -lt 50 ]; then
              echo "::warning file=$file::Article is very short ($lines lines, minimum 50 recommended)"
            fi

            # Check maximum length
            if [ "$lines" -gt 500 ]; then
              echo "::warning file=$file::Article is very long ($lines lines, consider splitting)"
            fi

            # Check has H1 title (may be after frontmatter, so check first 15 lines)
            if ! head -15 "$file" | grep -q "^# "; then
              echo "::error file=$file::Missing H1 title"
              errors=$((errors + 1))
            fi

            # Check has at least one H2 section
            if ! grep -q "^## " "$file"; then
              echo "::error file=$file::No H2 sections found"
              errors=$((errors + 1))
            fi

            # Check file name is kebab-case
            basename=$(basename "$file" .md)
            if [[ ! "$basename" =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
              echo "::warning file=$file::File name '$basename' should be kebab-case"
            fi

            # Check for forbidden content - course/instructor references
            forbidden_patterns=(
              "Udemy" "Coursera" "Stepik" "OTUS" "Karpov" "Geekbrains"
              "Skillbox" "Нетология" "Яндекс Практикум" "instructor"
              "this course" "in the course" "the lecturer"
            )
            for pattern in "${forbidden_patterns[@]}"; do
              if grep -qi "$pattern" "$file"; then
                echo "::error file=$file::Contains forbidden content: '$pattern'"
                errors=$((errors + 1))
              fi
            done

            # Check code blocks have language tags
            if grep -P "^\`\`\`$" "$file" > /dev/null 2>&1; then
              count=$(grep -cP "^\`\`\`$" "$file" || true)
              echo "::warning file=$file::$count code block(s) without language tag"
            fi

            # Check wiki-links syntax (should be [[Title]] not [Title])
            if grep -P "\[\[[^\]]*\]\(" "$file" > /dev/null 2>&1; then
              echo "::warning file=$file::Possible malformed wiki-link (found [[...]()"
            fi

            echo "  Lines: $lines | OK"
          done <<< "$CHANGED_FILES"

          if [ $errors -gt 0 ]; then
            echo ""
            echo "::error::$errors validation error(s) found"
            exit 1
          fi

          echo ""
          echo "All articles passed validation."

  check-domain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v46
        with:
          files: 'docs/**/*.md'
          safe_output: true
          separator: "\n"

      - name: Check domain folders
        if: steps.changed.outputs.any_changed == 'true'
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          valid_domains=(
            "algorithms" "architecture" "audio-voice" "bi-analytics" "cpp"
            "data-engineering" "data-science" "devops" "go" "image-generation"
            "ios-mobile" "java-spring" "kafka" "linux-cli" "llm-agents"
            "llm-memory" "nodejs" "php" "python" "rust" "security"
            "seo-marketing" "sql-databases" "testing-qa" "web-frontend"
            "writing" "contributing" "blog"
          )

          while IFS= read -r file; do
            # Strip trailing backslash/CR from safe_output
            file="${file%\\}"
            file="${file%$'\r'}"
            [ -z "$file" ] && continue
            # Skip root-level files
            dir=$(dirname "$file" | sed 's|docs/||' | cut -d/ -f1)
            if [ "$dir" = "docs" ] || [ "$dir" = "." ]; then
              continue
            fi

            found=false
            for domain in "${valid_domains[@]}"; do
              if [ "$dir" = "$domain" ]; then
                found=true
                break
              fi
            done

            if [ "$found" = false ]; then
              echo "::warning file=$file::Unknown domain folder '$dir'. Valid domains: ${valid_domains[*]}"
            fi
          done <<< "$CHANGED_FILES"

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check all internal links
        run: python lint.link-check.py --strict
